<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Attendance</title>
    <link rel="stylesheet" href="/css/attendance.css">

    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        select {
            width: 100px;
        }

        button {
            padding: 6px 12px;
            border-radius: 4px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:disabled {
            background-color: gray;
            cursor: not-allowed;
        }

        .holiday-message {
            color: red;
            font-weight: bold;
            margin-top: 10px;
        }

        .pending {
            color: red;
            font-weight: bold;
        }

        .holiday {
            color: blue;
            font-weight: bold;
        }

        .present {
            color: green;
        }
    </style>
</head>

<body>




    <div class="dashboard-wrapper">

        <div class="sidebar">
            <h2>Admin Panel</h2>
            <a href="/dashboard" class="active">Dashboard</a>
            <a href="/employees" >Employee Management</a>
            <a href="/attendance">Attendance</a>
            <a href="/payroll">Payroll Processing</a>
            <a href="/reports">Reports</a>
            <a href="/profile">Profile</a>
            <a href="/logout">Logout</a>
        </div>

         <div class="main-content">
      
<div class="container">
    <h2>Attendance for <span th:text="${today}"></span></h2>

    <div th:if="${isSunday}" class="holiday-message">
        Today is Sunday - Holiday. Attendance cannot be marked.
    </div>

    <form method="get" action="/attendance">
        <input type="date" name="date" th:value="${today}">
        <button type="submit">Show</button>
    </form>

    <form method="post" action="/attendance/save">
        <input type="hidden" name="date" th:value="${today}">

        <table>
            <tr>
                <th>Emp ID</th>
                <th>Name</th>
                <th>Status</th>
            </tr>

            <tr th:each="emp : ${employees}">
                <td th:text="${emp.empId}"></td>
                <td th:text="${emp.fullName}"></td>

                <td>
                    <div th:if="${attendanceMap[emp.empId] != null}">
                        <span th:text="${attendanceMap[emp.empId].status}"></span>
                    </div>

                    <div th:if="${attendanceMap[emp.empId] == null}">

                        <div th:if="${isSunday}">
                            <span class="holiday">Holiday</span>
                        </div>

                        <div th:if="${!isSunday}">
                            <select name="status" required>
                                <option value="">--Select--</option>
                                <option value="Present">Present</option>
                                <option value="Absent">Absent</option>
                                <option value="Leave">Leave</option>
                            </select>

                            <input type="hidden" name="empId" th:value="${emp.empId}">
                            <input type="hidden" name="employeeName" th:value="${emp.fullName}">
                        </div>

                    </div>
                </td>
            </tr>
        </table>

        <br>
        <button type="submit" th:disabled="${isSunday}">Save All</button>
    </form>

    <!-- ================= MONTH VIEW ================= -->

    <h3>Monthly Attendance</h3>

    <form method="get" action="/attendance">
        <input type="text" name="empId" placeholder="Employee ID" required>
        <input type="month" name="month" required>
        <button type="submit">View</button>
    </form>

    <div th:if="${monthView != null}">
        <h4>
            Employee:
            <span th:text="${selectedEmpId}"></span>
            |
            Month:
            <span th:text="${selectedMonth}"></span>
        </h4>

        <table>
            <tr>
                <th>Date</th>
                <th>Status</th>
            </tr>

            <tr th:each="row : ${monthView}">
                <td th:text="${row.date}"></td>

                <td th:text="${row.status}"
                    th:classappend="${row.status == 'Pending'} ? 'pending' :
                                    (${row.status == 'Holiday'} ? 'holiday' : 'present')">
                </td>
            </tr>
        </table>
    </div>

</div>

        </div>
    </div>

<script src="/js/session-manager.js"></script>

</body>
</html>
