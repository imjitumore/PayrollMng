<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Leave Requests</title>
    <link rel="stylesheet" href="/css/attendance.css">
</head>
<body>
<div class="dashboard-wrapper">
    <div class="sidebar">
        <h2>Admin Panel</h2>
        <a href="/dashboard">Dashboard</a>
        <a href="/employees">Employee Management</a>
        <a href="/attendance">Attendance</a>
        <a href="/payroll">Payroll Processing</a>
        <a href="/reports">Reports</a>
        <a href="/profile">Profile</a>
        <a href="/logout">Logout</a>
    </div>
    <div class="main-content">
        <h1>All Leave Requests</h1>
        <table>
            <thead>
            <tr>
                <th>Employee</th>
                <th>From</th>
                <th>To</th>
                <th>Type</th>
                <th>Duration</th>
                <th>Reason</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="l : ${leaves}">
                <td th:text="${l.empId}"></td>
                <td th:text="${l.fromDate}"></td>
                <td th:text="${l.toDate}"></td>
                <td th:text="${l.leaveType}"></td>
                <td th:text="${l.duration}"></td>
                <td th:text="${l.reason}"></td>
                <td th:text="${l.status}"></td>
                <td>
                    <form th:action="@{|/admin/leaves/${l.id}/approve|}" method="post" style="display:inline">
                        <button type="submit">Approve</button>
                    </form>
                    <form th:action="@{|/admin/leaves/${l.id}/reject|}" method="post" style="display:inline">
                        <button type="submit">Reject</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
