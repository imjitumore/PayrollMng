<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Profile</title>
    <link rel="stylesheet" href="/css/profile.css">
</head>

<body>

    <div class="dashboard-wrapper">
        <!-- admin sidebar shown when current user is NOT an employee -->
        <div class="sidebar" th:if="${!currentUserIsEmployee}">
            <h2>Admin Panel</h2>
            <a th:href="@{/dashboard}" class="active">Dashboard</a>
            <a href="/employees">Employee Management</a>
            <a href="/attendance">Attendance</a>
            <a href="/payroll">Payroll Processing</a>
            <a href="/reports">Reports</a>
            <a href="/profile">Profile</a>
            <a href="/logout">Logout</a>
        </div>
        <!-- employee portal sidebar for employees viewing their own profile -->
        <div class="sidebar" th:if="${currentUserIsEmployee}">
            <h2>Employee Portal</h2>
            <a href="/portal">Home</a>
            <a href="/portal/apply-leave">Apply for Leave</a>
            <a href="/portal/leave-list">My Leave Requests</a>
            <a href="/portal/attendance-status">Attendance Status</a>
            <a href="/portal/salary">Salary Slip</a>
            <a href="/profile">Profile</a>
            <a href="/logout">Logout</a>
        </div>

        <div class="main-content">
            <div class="profile-container">
                <h2 th:if="${viewingEmployee}">Employee Profile</h2>
                <h2 th:if="${!viewingEmployee}">My Profile</h2>

                <!-- PENCIL ICON TOP-RIGHT - Only show if viewing own profile -->
                <div class="edit-icon-top" th:if="${!viewingEmployee}">✎</div>

                <!-- PROFILE FORM -->
                <form id="editForm" enctype="multipart/form-data">
                    <label>Username</label>
                    <input type="text" name="username" th:value="${user.username}" readonly>

                    <!-- show empId input only when user record actually has one (admin owns no empId) -->
                    <label th:if="${user.empId != null}">Employee ID</label>
                    <input th:if="${user.empId != null}" type="text" name="empId" th:value="${user.empId}" readonly>

                    <label>Contact</label>
                    <input type="text" name="contact" th:value="${user.contact}" readonly>

                    <label>Address</label>
                    <textarea name="address" readonly th:text="${user.address}"></textarea>

                    <button type="submit" style="display:none;">Update</button>
                </form>

                <!-- Back to Portal button if viewing employee profile -->
                <div class="back-button" th:if="${viewingEmployee}">
                    <a href="/portal" class="btn-back">← Back to Portal</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const editIcon = document.querySelector('.edit-icon-top');
        const editForm = document.getElementById('editForm');
        const usernameInput = editForm.querySelector('[name=username]');
        const empIdInput = editForm.querySelector('[name=empId]');
        const contactInput = editForm.querySelector('[name=contact]');
        const addressInput = editForm.querySelector('textarea[name=address]');
        const inputs = editForm.querySelectorAll('input[type=text], textarea');
        const submitBtn = editForm.querySelector('button');

        // Only enable pencil icon if it exists (own profile view)
        if (editIcon) {
            editIcon.addEventListener('click', () => {
                inputs.forEach(i => i.removeAttribute('readonly'));
                submitBtn.style.display = 'block';
            });
        }

        // AJAX form submit
        editForm.addEventListener('submit', e => {
            e.preventDefault();
            const formData = new FormData(editForm);

            fetch('/profile/update', {
                method: 'POST',
                body: formData
            })
                .then(res => res.json())
                .then(user => {
                    if (!user) return;

                    if (usernameInput) usernameInput.value = user.username;
                    if (empIdInput) empIdInput.value = user.empId;
                    if (contactInput) contactInput.value = user.contact;
                    if (addressInput) addressInput.value = user.address;

                    inputs.forEach(i => i.setAttribute('readonly', true));
                    submitBtn.style.display = 'none';
                });
        });
    </script>

</body>

</html>
