<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login Dashboard</title>
    <link rel="stylesheet" href="/css/login.css" />
    <!-- You can use Google Fonts or any CDN -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Please enter your credentials to continue</p>

        <div th:if="${error}" class="error-message" th:text="${error}"></div>

        <form id="loginForm" action="/login" method="post" class="login-form" autocomplete="off">
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    required 
                    placeholder="Enter your username"
                    autocomplete="username"
                />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required 
                    placeholder="••••••••"
                    autocomplete="current-password"
                />
            </div>

            <button type="submit" class="login-btn">
                Sign In
            </button>
        </form>

        <div class="extra-links">
            <a href="#">Forgot password?</a>
            <p>New admin? <a href="/signup">Create account</a></p>
        </div>
    </div>
</div>

<script src="/js/session-manager.js"></script>
<script>
    // Store login info in local storage when form is submitted
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        const username = document.getElementById('username').value;
        if (username) {
            SessionManager.storeUserData(username);
        }
    });
</script>

</body>
</html>
